<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Dashboard — Feature Checklist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #efefec;
    --text-primary: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9e9e99;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green-bg: #E1F5EE;
    --green-text: #0F6E56;
    --green-accent: #1D9E75;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  }
 
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0efe8;
      --text-secondary: #a0a09a;
      --text-tertiary: #6b6b65;
      --border: rgba(255,255,255,0.1);
      --border-strong: rgba(255,255,255,0.2);
      --green-bg: #04342C;
      --green-text: #9FE1CB;
      --amber-bg: #412402;
      --amber-text: #FAC775;
      --blue-bg: #042C53;
      --blue-text: #B5D4F4;
      --red-bg: #501313;
      --red-text: #F7C1C1;
    }
  }
 
  body {
    font-family: var(--font);
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
 
  .page {
    max-width: 760px;
    margin: 0 auto;
  }
 
  header {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    padding: 1.5rem 1.75rem;
    margin-bottom: 1.25rem;
  }
 
  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
 
  header p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
 
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 1.25rem;
  }
 
  .stat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 10px 14px;
  }
 
  .stat-val {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.02em;
  }
 
  .stat-val.green { color: var(--green-accent); }
 
  .stat-lbl {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
 
  .progress-bar {
    height: 5px;
    background: var(--bg-secondary);
    border-radius: 3px;
    margin-top: 1.25rem;
    overflow: hidden;
  }
 
  .progress-fill {
    height: 100%;
    background: var(--green-accent);
    border-radius: 3px;
    transition: width 0.35s ease;
  }
 
  .progress-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
  }
 
  .section {
    background: var(--bg);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    margin-bottom: 1rem;
    overflow: hidden;
  }
 
  .section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-secondary);
  }
 
  .section-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    background: var(--bg-tertiary);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
 
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
 
  .section-count {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-tertiary);
    background: var(--bg-tertiary);
    padding: 2px 8px;
    border-radius: 20px;
  }
 
  .task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 11px 18px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
  }
 
  .task:last-child { border-bottom: none; }
  .task:hover { background: var(--bg-secondary); }
  .task.done .task-text { text-decoration: line-through; color: var(--text-tertiary); }
  .task.done .task-meta { opacity: 0.5; }
 
  .task input[type=checkbox] {
    margin-top: 2px;
    flex-shrink: 0;
    width: 15px;
    height: 15px;
    cursor: pointer;
    accent-color: var(--green-accent);
  }
 
  .task-body { flex: 1; min-width: 0; }
 
  .task-text {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.45;
  }
 
  .task-meta {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 5px;
  }
 
  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
 
  .badge-green  { background: var(--green-bg);  color: var(--green-text); }
  .badge-amber  { background: var(--amber-bg);  color: var(--amber-text); }
  .badge-blue   { background: var(--blue-bg);   color: var(--blue-text); }
  .badge-red    { background: var(--red-bg);    color: var(--red-text); }
  .badge-gray   { background: var(--bg-secondary); color: var(--text-secondary); border: 0.5px solid var(--border-strong); }
 
  .subtask {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 8px 18px 8px 44px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    user-select: none;
    background: var(--bg-secondary);
  }
 
  .subtask:last-child { border-bottom: none; }
  .subtask:hover { background: var(--bg-tertiary); }
  .subtask.done .task-text { text-decoration: line-through; color: var(--text-tertiary); }
 
  .subtask input[type=checkbox] {
    margin-top: 1px;
    flex-shrink: 0;
    width: 13px;
    height: 13px;
    cursor: pointer;
    accent-color: var(--green-accent);
  }
 
  .subtask .task-text {
    font-size: 13px;
    color: var(--text-secondary);
  }
 
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
  }
 
  .filter-btn {
    font-size: 12px;
    font-family: var(--font);
    padding: 5px 12px;
    border-radius: 20px;
    border: 0.5px solid var(--border-strong);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
  }
 
  .filter-btn:hover { background: var(--bg-secondary); }
  .filter-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }
</style>
</head>
<body>
<div class="page">
 
  <header>
    <h1>Campaign Dashboard — Feature Checklist</h1>
    <p>Product spec &amp; development backlog</p>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-val green" id="s-done">0</div><div class="stat-lbl">Complete</div></div>
      <div class="stat"><div class="stat-val" id="s-left">0</div><div class="stat-lbl">Remaining</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <p class="progress-label" id="prog-label">0 of 0 tasks complete</p>
  </header>
 
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="done">Done</button>
  </div>
 
  <div id="list"></div>
 
</div>
 
<script>
const data = [
  {
    section: "Metrics & ROI",
    icon: "📊",
    tasks: [
      { text: "ROI colour coding", badges: ["ui"], subtasks: [
        { text: "Green: ROI > 30%" },
        { text: "Yellow: 0% ≤ ROI < 30%" },
        { text: "Red: ROI ≤ 0%" },
        { text: "Formula: Margin / Cost" }
      ]},
      { text: "Campaign cards — summary metrics: Cost | Total Conversions | Revenue | Margin | ROI", badges: ["ui"] },
      { text: "Table row metrics: Cost | Convs | CPA | Revenue | Margin | ROI", badges: ["ui"] },
      { text: "Cost and CPA displayed in original currency", badges: ["currency"] },
      { text: "Add Conversions Google / Conversions Mob columns", badges: ["data"] },
      { text: "Mob conversions column", badges: ["data"] },
      { text: "Payout column", badges: ["data"] },
      { text: "Revenue column", badges: ["data"] },
    ]
  },
  {
    section: "Data & IDs",
    icon: "🗄️",
    tasks: [
      { text: "Rename field: id → campaign_id", badges: ["data", "schema"] },
      { text: "Exchange rate field — per month (new side tab)", badges: ["currency", "new tab"] },
      { text: "Unallocated costs — flag and handle", badges: ["data", "warning"] },
      { text: "Cart account cost tracking", badges: ["data"] },
    ]
  },
  {
    section: "Drilldown",
    icon: "🔍",
    tasks: [
      { text: "Operator drilldown with cost per conversion", badges: ["feature"] },
      { text: "Payout history — payouts change throughout the month, must be visible", badges: ["feature", "important"] },
      { text: "Client view (inside portal)", badges: ["feature"] },
    ]
  },
  {
    section: "UX & Table",
    icon: "🖥️",
    tasks: [
      { text: "Scrollable table", badges: ["ui"] },
      { text: "Add rows for manual adjustments (with approvals) — for later", badges: ["ui", "later"] },
    ]
  },
  {
    section: "Accounts & Alerts",
    icon: "🔔",
    tasks: [
      { text: "Suspended accounts — show in report", badges: ["alert"] },
      { text: "Alerts for suspended accounts", badges: ["alert", "important"] },
    ]
  },
  {
    section: "Auth & Logging",
    icon: "🔐",
    tasks: [
      { text: "Google login / authentication", badges: ["auth"] },
      { text: "Audit log for all changes", badges: ["logging"] },
    ]
  },
  {
    section: "Data Pipeline / Process",
    icon: "⚙️",
    tasks: [
      { text: "Google MCC — download monthly report (last month, all campaigns, all ad groups)", badges: ["process"] },
      { text: "Excel: apply correct exchange rate per month", badges: ["process"] },
      { text: "Excel: group TS costs by account (careful with campaign_id!)", badges: ["process", "warning"] },
    ]
  }
];
 
const badgeClass = {
  ui: "badge-blue", data: "badge-blue", schema: "badge-gray", currency: "badge-amber",
  feature: "badge-blue", important: "badge-red", later: "badge-gray",
  alert: "badge-red", auth: "badge-blue", logging: "badge-gray",
  process: "badge-gray", warning: "badge-amber", "new tab": "badge-green"
};
 
let allBoxes = [];
let currentFilter = "all";
 
function buildList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  allBoxes = [];
 
  data.forEach(sec => {
    const secDiv = document.createElement("div");
    secDiv.className = "section";
    secDiv.dataset.section = sec.section;
 
    const hdr = document.createElement("div");
    hdr.className = "section-header";
 
    const icon = document.createElement("div");
    icon.className = "section-icon";
    icon.textContent = sec.icon;
 
    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = sec.section;
 
    const count = document.createElement("span");
    count.className = "section-count";
    count.textContent = sec.tasks.length + " tasks";
 
    hdr.appendChild(icon);
    hdr.appendChild(title);
    hdr.appendChild(count);
    secDiv.appendChild(hdr);
 
    sec.tasks.forEach(task => {
      const taskDiv = document.createElement("div");
      taskDiv.className = "task";
 
      const cb = document.createElement("input");
      cb.type = "checkbox";
      const state = loadState(task.text);
      cb.checked = state;
      if (state) taskDiv.classList.add("done");
 
      cb.addEventListener("change", () => {
        taskDiv.classList.toggle("done", cb.checked);
        saveState(task.text, cb.checked);
        updateStats();
        applyFilter();
      });
 
      taskDiv.addEventListener("click", e => {
        if (e.target !== cb) { cb.checked = !cb.checked; cb.dispatchEvent(new Event("change")); }
      });
 
      const body = document.createElement("div");
      body.className = "task-body";
 
      const txt = document.createElement("div");
      txt.className = "task-text";
      txt.textContent = task.text;
      body.appendChild(txt);
 
      if (task.badges && task.badges.length) {
        const meta = document.createElement("div");
        meta.className = "task-meta";
        task.badges.forEach(b => {
          const badge = document.createElement("span");
          badge.className = "badge " + (badgeClass[b] || "badge-gray");
          badge.textContent = b;
          meta.appendChild(badge);
        });
        body.appendChild(meta);
      }
 
      taskDiv.appendChild(cb);
      taskDiv.appendChild(body);
      secDiv.appendChild(taskDiv);
      allBoxes.push({ el: taskDiv, cb });
 
      if (task.subtasks) {
        task.subtasks.forEach(st => {
          const stDiv = document.createElement("div");
          stDiv.className = "subtask";
 
          const scb = document.createElement("input");
          scb.type = "checkbox";
          const sstate = loadState(st.text);
          scb.checked = sstate;
          if (sstate) stDiv.classList.add("done");
 
          scb.addEventListener("change", () => {
            stDiv.classList.toggle("done", scb.checked);
            saveState(st.text, scb.checked);
            updateStats();
            applyFilter();
          });
 
          stDiv.addEventListener("click", e => {
            if (e.target !== scb) { scb.checked = !scb.checked; scb.dispatchEvent(new Event("change")); }
          });
 
          const stxt = document.createElement("div");
          stxt.className = "task-text";
          stxt.textContent = st.text;
 
          stDiv.appendChild(scb);
          stDiv.appendChild(stxt);
          secDiv.appendChild(stDiv);
          allBoxes.push({ el: stDiv, cb: scb });
        });
      }
    });
 
    list.appendChild(secDiv);
  });
 
  updateStats();
  applyFilter();
}
 
function updateStats() {
  const total = allBoxes.length;
  const done = allBoxes.filter(b => b.cb.checked).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById("prog").style.width = pct + "%";
  document.getElementById("prog-label").textContent = done + " of " + total + " tasks complete (" + pct + "%)";
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-done").textContent = done;
  document.getElementById("s-left").textContent = total - done;
}
 
function applyFilter() {
  allBoxes.forEach(({ el, cb }) => {
    if (currentFilter === "all") { el.style.display = ""; }
    else if (currentFilter === "done") { el.style.display = cb.checked ? "" : "none"; }
    else if (currentFilter === "pending") { el.style.display = !cb.checked ? "" : "none"; }
  });
}
 
function saveState(key, val) {
  try { localStorage.setItem("todo:" + key, val ? "1" : "0"); } catch(e) {}
}
 
function loadState(key) {
  try { return localStorage.getItem("todo:" + key) === "1"; } catch(e) { return false; }
}
 
document.querySelectorAll(".filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.filter;
    applyFilter();
  });
});
 
buildList();
</script>
</body>
</html>
